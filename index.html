<script>
/**
 * PUNTUACIÓN (Guardado Local)
 */
const Meta = {
    highScore: parseInt(localStorage.getItem('vsr_highScore_arcade')) || 0,
    save(score) {
        if (score > this.highScore) {
            this.highScore = score;
            localStorage.setItem('vsr_highScore_arcade', this.highScore);
        }
    }
};

/**
 * SISTEMA DE VOZ
 */
const VoiceSys = {
    speak: (text) => {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.pitch = 0.5; u.rate = 1.1; u.volume = 0.7;
        window.speechSynthesis.speak(u);
    }
};

/**
 * SISTEMA DE AUDIO (SFX y Música Procedural de Emergencia)
 */
const AudioSys = (function() {
    let ctx = null, masterGain = null, isPlaying = false, time = 0;
    
    function init() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = ctx.createGain(); masterGain.gain.value = 0.3; masterGain.connect(ctx.destination);
    }

    function playTone(freq, type, duration, vol, detune=0, slideTo=null) {
        if(!ctx) return;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
        if(slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + duration);
        osc.detune.value = detune; gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain); gain.connect(masterGain); osc.start(); osc.stop(ctx.currentTime + duration);
    }

    function noiseBurst(duration, vol) {
        if(!ctx) return;
        const bSize = ctx.sampleRate * duration, buffer = ctx.createBuffer(1, bSize, ctx.sampleRate);
        const data = buffer.getChannelData(0); for(let i=0; i<bSize; i++) data[i] = Math.random()*2-1;
        const noise = ctx.createBufferSource(); noise.buffer = buffer;
        const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
        const gain = ctx.createGain(); gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        noise.connect(filter); filter.connect(gain); gain.connect(masterGain); noise.start();
    }

    const sfx = {
        shoot: () => playTone(300, 'sine', 0.15, 0.4, 0, 150),
        enemyShoot: () => playTone(400, 'triangle', 0.2, 0.2, 0, 200),
        hit: () => noiseBurst(0.15, 0.4),
        explosion: () => { noiseBurst(0.4, 0.6); playTone(100, 'sine', 0.5, 0.7, 0, 50); },
        emp: () => { noiseBurst(1.0, 0.8); playTone(600, 'sine', 1.0, 0.8, 0, 50); },
        score: () => { playTone(880, 'sine', 0.1, 0.2); setTimeout(() => playTone(1760, 'sine', 0.2, 0.2), 100); },
        damage: () => playTone(150, 'sawtooth', 0.3, 0.6, 0, 50),
        powerup: () => { playTone(440, 'sine', 0.15, 0.4, 0, 880); setTimeout(() => playTone(880, 'sine', 0.2, 0.4, 0, 1760), 100); },
        bossDefeat: () => { noiseBurst(3.0, 0.8); playTone(80, 'sawtooth', 3.0, 0.8, 0, 20); },
        warp: () => { playTone(50, 'sine', 5.0, 1.0, 0, 1200); noiseBurst(5.0, 0.3); }
    };

    function musicLoop() {
        if(!isPlaying || !ctx) return;
        const beat = time % 16;
        const isBoss = Game.boss && Game.boss.active;
        const isWarp = Game.warpTimer > 0;
        
        let tempo = isWarp ? 150 : 250; 
        
        if (beat % 8 === 0) {
            playTone(isBoss ? 40 : (Game.level===2 ? 45 : 50), 'sine', 1.5, 0.5);
            playTone(isBoss ? 40.5 : (Game.level===2 ? 45.5 : 50.5), 'triangle', 1.5, 0.3);
        }
        if (beat % 4 === 0) { noiseBurst(0.08, 0.15); }

        const notesL1 = [220, 330, 440, 330];
        const notesL2 = [200, 300, 360, 300];
        const notesL3 = [150, 250, 350, 250];
        const bossNotes = [150, 140, 130, 140];
        
        let notes = isBoss ? bossNotes : (Game.level===1?notesL1:(Game.level===2?notesL2:notesL3));
        
        if (beat % 2 === 0) {
            let freq = notes[(beat/2) % notes.length];
            playTone(freq, 'triangle', 0.8, 0.2);
            playTone(freq * 1.01, 'sine', 0.8, 0.15);
        }
        time++; setTimeout(musicLoop, tempo);
    }

    return { init, sfx, startMusic: () => { isPlaying = true; musicLoop(); }, stopMusic: () => isPlaying = false };
})();

/**
 * SISTEMA MIDI (NUEVO) - Usa Tone.js para reproducir archivos locales
 */
const MidiSys = {
    normalMidi: null, bossMidi: null,
    currentPart: null, synths: [], gain: null,
    currentType: null, loaded: false, fallback: false,

    async load() {
        if (this.loaded || this.fallback) return;
        try {
            // Inicializar ganancia master para la música
            this.gain = new Tone.Gain(0).toDestination();
            
            // Creamos 4 sintetizadores de onda cuadrada/sierra para ese estilo retro
            for(let i=0; i<4; i++) {
                this.synths.push(new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: i % 2 === 0 ? "square8" : "sawtooth" },
                    envelope: { attack: 0.02, decay: 0.2, sustain: 0.2, release: 0.5 }
                }).connect(this.gain));
            }

            // Descargamos y procesamos los MIDIs
            const [res1, res2] = await Promise.all([
                fetch('DEPECHE MODE.Photographic.mid'),
                fetch('Depeche Mode - Black Celebration.mid')
            ]);
            
            if (!res1.ok || !res2.ok) throw new Error("MIDI files not found locally");

            const [buf1, buf2] = await Promise.all([res1.arrayBuffer(), res2.arrayBuffer()]);
            this.normalMidi = new Midi(buf1);
            this.bossMidi = new Midi(buf2);
            this.loaded = true;

        } catch(e) {
            console.warn("MIDI Error (Local fetch failed). Using Procedural fallback.", e);
            this.fallback = true;
            AudioSys.init();
        }
    },

    play(type) {
        if (this.fallback) {
            if (this.currentType === null) AudioSys.startMusic();
            this.currentType = type;
            return;
        }

        if (this.currentType === type || !this.loaded) return;
        this.currentType = type;

        const midi = type === 'boss' ? this.bossMidi : this.normalMidi;
        if (!midi) return;

        const startNew = () => {
            if (this.currentPart) {
                this.currentPart.dispose();
                this.synths.forEach(s => s.releaseAll());
            }
            Tone.Transport.stop();
            Tone.Transport.cancel(); // Limpia eventos

            // Creamos la secuencia
            this.currentPart = new Tone.Part((time, note) => {
                const synth = this.synths[note.trackIndex % this.synths.length];
                // Reducimos velocity general para no saturar
                synth.triggerAttackRelease(note.name, note.duration, time, note.velocity * 0.4);
            }, []).start(0);

            // Poblar secuencia con las notas del MIDI
            let activeTrackIdx = 0;
            midi.tracks.forEach(track => {
                if (track.notes.length > 0) {
                    track.notes.forEach(note => {
                        this.currentPart.add(note.time, { 
                            name: note.name, duration: note.duration, 
                            velocity: note.velocity, trackIndex: activeTrackIdx 
                        });
                    });
                    activeTrackIdx++;
                }
            });

            this.currentPart.loop = true; 
            this.currentPart.loopEnd = midi.duration || 60;
            Tone.Transport.start();

            // Fade in suave
            this.gain.gain.cancelScheduledValues(Tone.now());
            this.gain.gain.setValueAtTime(0, Tone.now());
            this.gain.gain.linearRampToValueAtTime(0.25, Tone.now() + 2); 
        };

        if (this.currentPart) {
            // Fade out de lo actual
            this.gain.gain.cancelScheduledValues(Tone.now());
            this.gain.gain.linearRampToValueAtTime(0, Tone.now() + 1.5);
            setTimeout(startNew, 1600);
        } else {
            startNew();
        }
    },

    stop() {
        this.currentType = null;
        if (this.fallback) {
            AudioSys.stopMusic();
            return;
        }
        if (this.gain) {
            this.gain.gain.cancelScheduledValues(Tone.now());
            this.gain.gain.linearRampToValueAtTime(0, Tone.now() + 1.5);
            setTimeout(() => {
                if (this.currentPart) this.currentPart.dispose();
                this.synths.forEach(s => s.releaseAll());
                Tone.Transport.stop();
            }, 1600);
        }
    }
};


/**
 * MOTOR DEL JUEGO Y GRÁFICOS 3D
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let width, height, halfWidth, halfHeight;
function resize() {
    width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
    halfWidth = width / 2; halfHeight = height / 2;
}
window.addEventListener('resize', resize); resize();

const FOV = 300, Z_LIMIT = 2000, CAMERA_Y = -100;
let BASE_SPEED = 12, SPEED = 12; 

let gameLoopId, frames = 0, score = 0, difficulty = 1;
let screenShake = 0, combo = 0, multiplier = 1, emps = 3, nextBossScore = 2000;

const Game = {
    state: 'START', level: 1, warpTimer: 0, flashAlpha: 0, bossDeathTimer: 0, playerDeathTimer: 0,
    entities: [], particles: [], bullets: [], powerups: [], boss: null
};

// Controles de Teclado
const keys = { w:false, a:false, s:false, d:false, space:false, shift:false, b:false };
window.addEventListener('keydown', e => {
    if(e.code==='KeyW'||e.code==='ArrowUp') keys.w = true; if(e.code==='KeyA'||e.code==='ArrowLeft') keys.a = true;
    if(e.code==='KeyS'||e.code==='ArrowDown') keys.s = true; if(e.code==='KeyD'||e.code==='ArrowRight') keys.d = true;
    if(e.code==='Space') { keys.space = true; e.preventDefault(); }
    if(e.code==='ShiftLeft'||e.code==='ShiftRight') keys.shift = true;
    if(e.code==='KeyB') { keys.b = true; EMP.trigger(); }
});
window.addEventListener('keyup', e => {
    if(e.code==='KeyW'||e.code==='ArrowUp') keys.w = false; if(e.code==='KeyA'||e.code==='ArrowLeft') keys.a = false;
    if(e.code==='KeyS'||e.code==='ArrowDown') keys.s = false; if(e.code==='KeyD'||e.code==='ArrowRight') keys.d = false;
    if(e.code==='Space') keys.space = false; if(e.code==='ShiftLeft'||e.code==='ShiftRight') keys.shift = false;
    if(e.code==='KeyB') keys.b = false;
});

// Controles Táctiles (Mobile)
const bindTouch = (id, keyName) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
    el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[keyName] = false; });
};

bindTouch('btn-up', 'w');
bindTouch('btn-down', 's');
bindTouch('btn-left', 'a');
bindTouch('btn-right', 'd');
bindTouch('btn-m-fire', 'space');
const empBtn = document.getElementById('btn-m-emp');
if (empBtn) {
    empBtn.addEventListener('touchstart', (e) => { e.preventDefault(); EMP.trigger(); });
}

function project(x, y, z) {
    if (z <= -FOV) z = -FOV + 0.1;
    const scale = FOV / (FOV + z);
    return { x: x * scale + halfWidth, y: (y - CAMERA_Y) * scale + halfHeight, s: scale };
}

const WarpTunnel = {

const Env = {
    left: [], right: [], top: [], bottom: [],
    init() {
        this.left = []; this.right = []; this.top = []; this.bottom = [];
        for(let i=0; i<20; i++) {
            this.left.push({ z: i*150, y: Math.random() * -300 - 100 });
            this.right.push({ z: i*150, y: Math.random() * -300 - 100 });
            // Generación caverna (Nivel 3)
            this.top.push({ z: i*150, offset: (Math.random()-0.5)*150 });
            this.bottom.push({ z: i*150, offset: (Math.random()-0.5)*150 });
        }
    },
    updateAndDraw(ctx) {
        // ---- ESTILOS SUBTERRANEOS (Nivel 3) ----
        if (Game.level >= 3) {
            ctx.strokeStyle = (Game.boss && Game.boss.active) ? '#f00' : '#d0f';
            ctx.lineWidth = 2;
            
            const drawDeepLine = (startX, startY, array, frequency) => {
                ctx.beginPath();
                let first = true;
                for(let i=0; i<array.length; i++) {
                    let point = array[i];
                    if (!player.isDying) point.z -= SPEED;
                    
                    if (point.z < -FOV) {
                        point.z += 20 * 150;
                        point.offset = (Math.random()-0.5)*200;
                    }
                    if (point.z > -FOV) {
                        let dynamicX = startX + point.offset;
                        let dynamicY = startY + (Math.sin(frames * frequency + i) * 80);
                        let p = project(dynamicX, dynamicY, point.z);
                        if (first) { ctx.moveTo(p.x, p.y); first = false; }
                        else { ctx.lineTo(p.x, p.y); }
                    }
                }
                ctx.stroke();
            };

            // Techo de la caverna
            drawDeepLine(-500, -500, this.top, 0.03);
            drawDeepLine(0, -600, this.top, 0.04);
            drawDeepLine(500, -500, this.top, 0.03);
            
            // Suelo de la caverna
            drawDeepLine(-500, 300, this.bottom, 0.03);
            drawDeepLine(0, 400, this.bottom, 0.05);
            drawDeepLine(500, 300, this.bottom, 0.03);
            
            // Paredes
            drawDeepLine(-800, -100, this.left, 0.02);
            drawDeepLine(800, -100, this.right, 0.02);

            return; // Terminar ejecución de escenario
        }

        // ---- NIVELES 1 Y 2 ----
        let color = Game.level === 1 ? '#0a0' : '#0ff'; 
        if (Game.boss && Game.boss.active) color = '#a00';
        if (Game.warpTimer > 0) color = '#fff';

        ctx.strokeStyle = color; ctx.lineWidth = 2;
        const processSide = (arr, xOffset) => {
            ctx.beginPath(); let first = true;
            for(let i=0; i<arr.length; i++) {
                if (!player.isDying) arr[i].z -= SPEED;
                let dynamicY = arr[i].y;
                if (Game.level === 1 && !player.isDying) dynamicY += Math.sin(frames*0.05 + i)*50; 
                
                if (arr[i].z < -FOV) { arr[i].z += 20 * 150; arr[i].y = Math.random() * -300 - 100; }
                if (arr[i].z > -FOV) {
                    let p = project(xOffset, dynamicY, arr[i].z);
                    if (Game.level === 1) { 
                        if (first) { ctx.moveTo(p.x, p.y); first = false; } else { ctx.lineTo(p.x, p.y); }
                        let base = project(xOffset, 0, arr[i].z);
                        ctx.lineTo(base.x, base.y); ctx.moveTo(p.x, p.y);
                    } else if (Game.level === 2) {
                        let base = project(xOffset, 0, arr[i].z);
                        let wOffset = xOffset < 0 ? 150 : -150;
                        let pWidth = project(xOffset + wOffset, dynamicY, arr[i].z);
                        let baseWidth = project(xOffset + wOffset, 0, arr[i].z);
                        ctx.moveTo(p.x, p.y); ctx.lineTo(pWidth.x, pWidth.y);
                        ctx.lineTo(baseWidth.x, baseWidth.y); ctx.lineTo(base.x, base.y); ctx.lineTo(p.x, p.y);
                    }
                }
            }
            ctx.stroke();
        };
        processSide(this.left, -800); processSide(this.right, 800);

        ctx.strokeStyle = Game.level===1 ? '#030' : '#033';
        if (Game.boss && Game.boss.active) ctx.strokeStyle = '#300';
        if (Game.warpTimer > 0) ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        
        const gridSize = 200; const offset = player.isDying ? 0 : (frames * SPEED) % gridSize;
        for (let z = 0; z < Z_LIMIT; z += gridSize) {
            let actualZ = z - offset; if (actualZ < -FOV) continue;
            let pL = project(-2000, 0, actualZ); let pR = project(2000, 0, actualZ);
            ctx.beginPath(); ctx.moveTo(pL.x, pL.y); ctx.lineTo(pR.x, pR.y); ctx.stroke();
        }
        for (let x = -2000; x <= 2000; x += 300) {
            let pN = project(x, 0, -FOV+10); let pF = project(x, 0, Z_LIMIT);
            ctx.beginPath(); ctx.moveTo(pN.x, pN.y); ctx.lineTo(pF.x, pF.y); ctx.stroke();
        }
    }
};

const Stars = {
    particles: [],
    init() {
        this.particles = [];
        for(let i=0; i<400; i++) this.particles.push({x: (Math.random()-0.5)*3000, y: (Math.random()-0.5)*2000, z: Math.random()*Z_LIMIT});
    },
    updateAndDraw(ctx) {
        let color = '#fff';
        if (Game.level >= 3) color = (frames % 10 < 5) ? '#f0f' : '#0ff'; // Neon cave dust
        if (Game.boss && Game.boss.active) color = '#faa';

        this.particles.forEach(s => {
            let currentSpeed = SPEED * (Game.warpTimer > 0 ? 4 : 1.5);
            if (!player || !player.isDying) s.z -= currentSpeed;
            
            if (s.z < -FOV) { s.z = Z_LIMIT; s.x = (Math.random()-0.5)*3000; s.y = (Math.random()-0.5)*2000; }
            let p = project(s.x, s.y, s.z);
            
            if (p.z >= -FOV && p.s > 0) {
                ctx.globalAlpha = Math.max(0.1, Math.min(1, (1 - s.z/Z_LIMIT)));
                
                let p2 = project(s.x, s.y, s.z + currentSpeed * 2);
                ctx.strokeStyle = color; 
                ctx.lineWidth = Math.max(0.5, 2 * p.s);
                ctx.beginPath(); 
                ctx.moveTo(p.x, p.y); 
                ctx.lineTo(p2.x, p2.y); 
                ctx.stroke();
            }
        });
        ctx.globalAlpha = 1.0;
    }
};

class Bullet {
    constructor(x, y, z, isPlayer, vx = 0, vy = 0) {
        this.x = x; this.y = y; this.z = z; this.vx = vx; this.vy = vy;
        this.isPlayer = isPlayer; this.vz = isPlayer ? 120 : -60;
        this.active = true;
    }
    update() {
        if (player.isDying) return; 
        this.z += this.vz; this.x += this.vx; this.y += this.vy;
        if (this.z > Z_LIMIT || this.z < -FOV) this.active = false;
        if (!this.isPlayer && this.active && !Game.warpTimer) {
            if (Math.abs(this.z - player.z) < 50 && Math.abs(this.x - player.x) < player.radius && Math.abs(this.y - player.y) < player.radius) {
                player.takeDamage(10); this.active = false;
            }
        }
    }
    draw(ctx) {
        let p = project(this.x, this.y, this.z);
        if (p.z < -FOV) return;
        
        ctx.fillStyle = this.isPlayer ? '#0ff' : '#f0f';
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        
        ctx.beginPath();
        if (this.vx !== 0) {
            ctx.ellipse(p.x, p.y, 6*p.s, 6*p.s, 0, 0, Math.PI*2);
        } else {
            ctx.ellipse(p.x, p.y, 3*p.s, 18*p.s, 0, 0, Math.PI*2);
        }
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Player {
    constructor() {
        this.x = 0; this.y = -50; this.z = 100; this.vx = 0; this.vy = 0;
        this.hp = 100; this.maxHp = 100;
        this.lastShot = 0; this.radius = 35; this.dashCooldown = 0;
        this.weaponLevel = 1; this.weaponTimer = 0; this.hitTimer = 0;
        this.isDying = false; 
    }
    update() {
        if (this.isDying || Game.warpTimer > 0) {
            this.x *= 0.9; this.y += (-100 - this.y) * 0.1;
            return; 
        }

        if (this.hitTimer > 0) this.hitTimer--;
        const accel = 4.5, fric = 0.85, maxSpeed = 35;

        if (keys.shift && this.dashCooldown <= 0) {
            if (keys.a) { this.vx -= 80; this.dashCooldown = 30; createParticles(this.x, this.y, this.z, '#0ff', 15); }
            else if (keys.d) { this.vx += 80; this.dashCooldown = 30; createParticles(this.x, this.y, this.z, '#0ff', 15); }
        }
        if (this.dashCooldown > 0) this.dashCooldown--;

        if (this.weaponTimer > 0) {
            this.weaponTimer--;
            if (this.weaponTimer <= 0) { this.weaponLevel = 1; VoiceSys.speak("Weapon Power Normal"); }
        }

        if (keys.a) this.vx -= accel; if (keys.d) this.vx += accel;
        if (keys.w) this.vy -= accel; if (keys.s) this.vy += accel;

        this.vx *= fric; this.vy *= fric;
        this.vx = Math.max(-maxSpeed, Math.min(maxSpeed, this.vx));
        this.vy = Math.max(-maxSpeed, Math.min(maxSpeed, this.vy));
        this.x += this.vx; this.y += this.vy;

        if (this.x < -600) this.x = -600; if (this.x > 600) this.x = 600;
        if (this.y > 100) this.y = 100; if (this.y < -500) this.y = -500;

        let fireRate = this.weaponLevel > 1 ? 5 : 8;
        if (keys.space && frames - this.lastShot > fireRate) this.shoot();
    }
    shoot() {
        AudioSys.sfx.shoot();
        if (this.weaponLevel === 1) {
            Game.bullets.push(new Bullet(this.x - 20, this.y, this.z, true));
            Game.bullets.push(new Bullet(this.x + 20, this.y, this.z, true));
        } else {
            Game.bullets.push(new Bullet(this.x - 25, this.y, this.z, true));
            Game.bullets.push(new Bullet(this.x, this.y, this.z, true));
            Game.bullets.push(new Bullet(this.x + 25, this.y, this.z, true));
            Game.bullets.push(new Bullet(this.x, this.y, this.z, true, -15));
            Game.bullets.push(new Bullet(this.x, this.y, this.z, true, 15));
        }
        this.lastShot = frames;
    }
    takeDamage(amount) {
        if (this.isDying) return;
        this.hp -= amount; this.hitTimer = 15; screenShake = 20; resetCombo();
        VoiceSys.speak("Shield Damage"); AudioSys.sfx.damage();
        createParticles(this.x, this.y, this.z, '#f00', 15, 'line');
        document.getElementById('hp').innerText = Math.max(0, this.hp);
        
        if (this.hp <= 0) {
            this.hp = 0;
            this.isDying = true;
            Game.playerDeathTimer = 120; 
            AudioSys.sfx.bossDefeat(); 
            VoiceSys.speak("CRITICAL SYSTEM FAILURE");
        }
    }
    draw(ctx) {
        let p = project(this.x, this.y, this.z);
        if (p.z < -FOV) return;
        let size = this.radius * p.s;

        if (this.isDying && frames % 4 < 2) return;

        if (!this.isDying && Game.state === 'PLAYING') {
            let thrust = size * (0.5 + Math.random() * 0.8); 
            
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0ff';

            ctx.beginPath();
            ctx.moveTo(p.x - size * 0.5, p.y + size * 0.8);
            ctx.lineTo(p.x - size * 1.5, p.y + size * 0.6);
            ctx.lineTo(p.x - size * 1.0, p.y + size * 0.6 + thrust);
            ctx.closePath();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(p.x + size * 0.5, p.y + size * 0.8);
            ctx.lineTo(p.x + size * 1.5, p.y + size * 0.6);
            ctx.lineTo(p.x + size * 1.0, p.y + size * 0.6 + thrust);
            ctx.closePath();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(p.x - size * 0.3, p.y + size * 0.65);
            ctx.lineTo(p.x + size * 0.3, p.y + size * 0.65);
            ctx.lineTo(p.x, p.y + size * 0.65 + thrust * 1.5);
            ctx.closePath();
            ctx.stroke();

            ctx.shadowBlur = 0;
        }

        ctx.strokeStyle = this.hitTimer > 0 || this.isDying ? '#f00' : '#fff';
        ctx.lineWidth = 2; ctx.shadowBlur = this.hitTimer > 0 ? 20 : 10; ctx.shadowColor = ctx.strokeStyle;

        ctx.beginPath();
        ctx.moveTo(p.x, p.y - size * 1.5); 
        ctx.lineTo(p.x + size * 0.4, p.y + size * 0.2);
        ctx.lineTo(p.x + size * 1.5, p.y + size * 0.6); 
        ctx.lineTo(p.x + size * 0.5, p.y + size * 0.8);
        ctx.lineTo(p.x, p.y + size * 0.5); 
        ctx.lineTo(p.x - size * 0.5, p.y + size * 0.8);
        ctx.lineTo(p.x - size * 1.5, p.y + size * 0.6); 
        ctx.lineTo(p.x - size * 0.4, p.y + size * 0.2);
        ctx.closePath(); ctx.stroke();

        ctx.fillStyle = (frames % 4 < 2) ? '#0ff' : '#00f';
        if (this.isDying) ctx.fillStyle = '#f00';
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath();
        ctx.arc(p.x - size * 0.3, p.y + size * 0.8, 4*p.s, 0, Math.PI*2);
        ctx.arc(p.x + size * 0.3, p.y + size * 0.8, 4*p.s, 0, Math.PI*2);
        ctx.fill(); ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor(x, y, z) {
        this.x = x; this.y = y; this.z = z; this.active = true;
        this.hp = 20 * Game.level; 
        this.radius = 60;
        this.hitTimer = 0;
        this.lastShot = frames + Math.random()*60;
    }
    update() {
        if (player.isDying) return; 
        if (this.hitTimer > 0) this.hitTimer--;
        this.z -= SPEED * 1.1;
        this.x += Math.sin(frames*0.05 + this.z)*8; this.y += Math.cos(frames*0.04)*4;
        if (this.z < -FOV) this.active = false;

        for (let b of Game.bullets) {
            if (b.isPlayer && b.active) {
                if (Math.abs(b.z - this.z) < 150 && Math.abs(b.x - this.x) < (this.radius * 2) && Math.abs(b.y - this.y) < (this.radius * 2.5)) {
                    this.hp -= 15; this.hitTimer = 5; b.active = false;
                    if (this.hp <= 0) { this.destroy(); return; }
                }
            }
        }

        if (this.active && Math.abs(this.z - player.z) < 100 && Math.abs(this.x - player.x) < (this.radius + player.radius) && Math.abs(this.y - player.y) < (this.radius + player.radius + 20)) {
            player.takeDamage(20); this.destroy(); return;
        }

        if (frames > this.lastShot && this.z > player.z + 100) {
            AudioSys.sfx.enemyShoot();
            Game.bullets.push(new Bullet(this.x, this.y, this.z, false));
            this.lastShot = frames + Math.max(30, 80 - (Game.level * 10));
        }
    }
    destroy() {
        this.active = false; screenShake = 5; AudioSys.sfx.explosion();
        createParticles(this.x, this.y, this.z, '#f00', 15, 'line');
        addComboScore(50);
    }
    draw(ctx) {
        let p = project(this.x, this.y, this.z);
        if (p.z < -FOV) return;
        let s = this.radius * p.s;

        ctx.strokeStyle = this.hitTimer > 0 ? '#fff' : '#f00';
        ctx.lineWidth = 2; ctx.shadowBlur = 15; ctx.shadowColor = ctx.strokeStyle;
        
        ctx.beginPath(); ctx.moveTo(p.x, p.y - s); ctx.lineTo(p.x + s, p.y); ctx.lineTo(p.x, p.y + s); ctx.lineTo(p.x - s, p.y);
        ctx.closePath(); ctx.stroke(); ctx.shadowBlur = 0;
    }
}

function triggerBossDeath(boss) {
    if (boss.isDying) return;
    boss.isDying = true;
    Game.bossDeathTimer = 180; 
    AudioSys.sfx.bossDefeat(); 
    VoiceSys.speak("Critical Core Destabilization Detected.");
    addScore(5000 * Game.level); 
}

class BossWorm {
    constructor() {
        this.segments = []; this.numSegments = 12; this.active = true; 
        this.hp = 1500; this.maxHp = 1500; this.timer = 0; this.x=0; this.y=-200; this.z=Z_LIMIT;
        VoiceSys.speak("Warning. Devourer class entity detected.");
        for(let i=0; i<this.numSegments; i++) this.segments.push({ x: 0, y: -200, z: Z_LIMIT + i*100, radius: i===0?80:50-(i*2), hitTimer: 0 });
    }
    update() {
        if (player.isDying && !this.isDying) return;
        this.timer++;
        let head = this.segments[0];
        head.x += (Math.sin(this.timer*0.03)*400 - head.x) * 0.05;
        head.y += (-200 + Math.cos(this.timer*0.05)*150 - head.y) * 0.05;
        head.z += (400 + Math.sin(this.timer*0.02)*200 - head.z) * 0.05;
        this.x = head.x; this.y = head.y; this.z = head.z; 

        for(let i=1; i<this.numSegments; i++) {
            let seg = this.segments[i], prev = this.segments[i-1];
            seg.x += (prev.x - seg.x) * 0.3; seg.y += (prev.y - seg.y) * 0.3; seg.z += (prev.z + 100 - seg.z) * 0.3;
        }

        for(let seg of this.segments) if (seg.hitTimer > 0) seg.hitTimer--;

        if (this.timer % 40 === 0 && !this.isDying) { 
            AudioSys.sfx.enemyShoot(); 
            Game.bullets.push(new Bullet(head.x, head.y, head.z, false)); 
        }

        if (!this.isDying) {
            for (let b of Game.bullets) {
                if (b.isPlayer && b.active) {
                    for(let i=0; i<this.numSegments; i++) {
                        let seg = this.segments[i]; let hitArea = seg.radius * 2.5;
                        if (Math.abs(b.z - seg.z) < 100 && Math.abs(b.x - seg.x) < hitArea && Math.abs(b.y - seg.y) < (hitArea * 1.5)) {
                            this.hp -= 15; seg.hitTimer = 5; b.active = false; break;
                        }
                    }
                }
            }
            if (this.hp <= 0) triggerBossDeath(this);
        }
    }
    drawSegment(ctx, i) {
        let seg = this.segments[i], p = project(seg.x, seg.y, seg.z);
        if (p.z < -FOV) return;
        let s = seg.radius * p.s;

        ctx.strokeStyle = seg.hitTimer > 0 ? '#fff' : (i===0 ? '#f00' : '#800');
        ctx.lineWidth = 3; ctx.shadowBlur = i===0 ? 20 : 5; ctx.shadowColor = ctx.strokeStyle;
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(p.x, p.y, s, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(p.x, p.y, s*0.5, 0, Math.PI*2); ctx.stroke(); ctx.shadowBlur = 0;
    }
    draw(ctx) {}
}

class BossMothership {
    constructor() {
        this.x = 0; this.y = -150; this.z = Z_LIMIT; this.active = true;
        this.hp = 3000; this.maxHp = 3000; this.timer = 0; this.radius = 200; this.hitTimer=0;
        VoiceSys.speak("Warning. Mothership fortress approaching.");
    }
    update() {
        if (player.isDying && !this.isDying) return;
        if (this.hitTimer > 0) this.hitTimer--;
        this.timer++;
        this.z += (300 - this.z) * 0.03; 
        this.x = Math.sin(this.timer * 0.02) * 350;
        
        if (this.timer % 60 === 0 && this.z < 500 && !this.isDying) {
            AudioSys.sfx.enemyShoot();
            Game.bullets.push(new Bullet(this.x - 100, this.y+50, this.z, false, -15, 5));
            Game.bullets.push(new Bullet(this.x, this.y+50, this.z, false, 0, 5));
            Game.bullets.push(new Bullet(this.x + 100, this.y+50, this.z, false, 15, 5));
        }
        
        if (!this.isDying) {
            for (let b of Game.bullets) {
                if (b.isPlayer && b.active) {
                    if (Math.abs(b.z - this.z) < 120 && Math.abs(b.x - this.x) < 300 && Math.abs(b.y - this.y) < 200) {
                        this.hp -= 15; this.hitTimer = 5; b.active = false;
                    }
                }
            }
            if (this.hp <= 0) triggerBossDeath(this);
        }
    }
    draw(ctx) {
        let p = project(this.x, this.y, this.z); if (p.z < -FOV) return;
        let w = 250 * p.s, h = 80 * p.s;

        ctx.strokeStyle = this.hitTimer > 0 ? '#fff' : '#f0f';
        ctx.lineWidth = 4; ctx.shadowBlur = 20; ctx.shadowColor = ctx.strokeStyle;
        
        ctx.beginPath();
        ctx.moveTo(p.x - w, p.y - h); ctx.lineTo(p.x + w, p.y - h);
        ctx.lineTo(p.x + w + 50*p.s, p.y + h); ctx.lineTo(p.x - w - 50*p.s, p.y + h);
        ctx.closePath(); ctx.stroke();
        
        ctx.fillStyle = (this.timer % 10 < 5) ? '#0ff' : '#000';
        ctx.fillRect(p.x - w*0.8, p.y + h, 40*p.s, 20*p.s);
        ctx.fillRect(p.x + w*0.8 - 40*p.s, p.y + h, 40*p.s, 20*p.s);
        ctx.shadowBlur = 0;
    }
}

class BossCore {
    constructor() {
        this.x = 0; this.y = -100; this.z = Z_LIMIT; this.active = true;
        this.hp = 5000; this.maxHp = 5000; this.timer = 0; this.radius = 100; this.hitTimer=0;
        this.shields = [{a:0},{a:Math.PI/2},{a:Math.PI},{a:Math.PI*1.5}];
        VoiceSys.speak("Warning. Main Core engaged.");
    }
    update() {
        if (player.isDying && !this.isDying) return;
        if (this.hitTimer > 0) this.hitTimer--;
        this.timer++;
        this.z += (250 - this.z) * 0.05; 
        this.x = Math.sin(this.timer * 0.04) * 200;
        this.y = -100 + Math.cos(this.timer * 0.05) * 100;

        this.shields.forEach(s => s.a += 0.05);

        if (this.timer % 10 === 0 && this.z < 400 && !this.isDying) {
            AudioSys.sfx.enemyShoot();
            let angle = this.timer * 0.2;
            Game.bullets.push(new Bullet(this.x, this.y, this.z, false, Math.cos(angle)*15, Math.sin(angle)*15));
        }

        if (!this.isDying) {
            for (let b of Game.bullets) {
                if (b.isPlayer && b.active && Math.abs(b.z - this.z) < 80) {
                    let blocked = false;
                    for(let s of this.shields) {
                        let sx = this.x + Math.cos(s.a)*250; let sy = this.y + Math.sin(s.a)*250;
                        if(Math.abs(b.x - sx) < 80 && Math.abs(b.y - sy) < 80) { blocked = true; break; }
                    }
                    
                    if (blocked) { b.active = false; createParticles(b.x, b.y, b.z, '#0ff', 5); }
                    else if (Math.abs(b.x - this.x) < 150 && Math.abs(b.y - this.y) < 150) {
                        this.hp -= 15; this.hitTimer = 5; b.active = false;
                    }
                }
            }
            if (this.hp <= 0) triggerBossDeath(this);
        }
    }
    draw(ctx) {
        let p = project(this.x, this.y, this.z); if (p.z < -FOV) return;
        
        ctx.lineWidth = 3;
        this.shields.forEach(s => {
            let sp = project(this.x + Math.cos(s.a)*250, this.y + Math.sin(s.a)*250, this.z);
            if(sp.z >= -FOV) {
                ctx.strokeStyle = '#0ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
                ctx.beginPath(); ctx.arc(sp.x, sp.y, 40*sp.s, 0, Math.PI*2); ctx.stroke();
            }
        });

        let sRadius = this.radius * p.s;
        ctx.strokeStyle = this.hitTimer > 0 ? '#fff' : '#f00';
        ctx.shadowBlur = 30; ctx.shadowColor = this.strokeStyle;
        ctx.beginPath(); ctx.arc(p.x, p.y, sRadius, 0, Math.PI*2); ctx.stroke();
        
        ctx.fillStyle = (this.timer % 20 < 10) ? '#f00' : '#fff';
        ctx.beginPath(); ctx.arc(p.x, p.y, sRadius*0.4, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class PowerUp {
    constructor(x, y, z) {
        this.x = x; this.y = y; this.z = z; 
        let rnd = Math.random();
        if (rnd < 0.5) this.type = 'heal';          
        else if (rnd < 0.85) this.type = 'weapon';   
        else this.type = 'life';                    
        this.active = true; this.radius = 35;
        this.color = this.type === 'heal' ? '#0f0' : (this.type === 'weapon' ? '#0ff' : '#fff');
    }
    update() {
        if (player.isDying) return;
        this.z -= SPEED * 1.2; 
        this.y += Math.sin(frames*0.1)*2; 
        if (this.z < -FOV) this.active = false;

        if (Math.abs(this.z - player.z) < 400) {
            this.x += (player.x - this.x) * 0.08;
            this.y += (player.y - this.y) * 0.08;
        }

        if (this.active && Math.abs(this.z - player.z) < 150 && Math.abs(this.x - player.x) < 180 && Math.abs(this.y - player.y) < 180) {
            AudioSys.sfx.powerup();
            
            if (this.type === 'heal') {
                player.hp = Math.min(player.maxHp, player.hp + 40);
                VoiceSys.speak("Shield Restored");
            } else if (this.type === 'weapon') {
                player.weaponLevel = 2; player.weaponTimer = 800;
                VoiceSys.speak("Weapon Upgraded");
            } else if (this.type === 'life') {
                player.hp = player.maxHp; 
                emps++; 
                document.getElementById('emp-count').innerText = emps;
                VoiceSys.speak("System Overcharged");
            }
            
            document.getElementById('hp').innerText = player.hp;
            createParticles(this.x, this.y, this.z, this.color, 25);
            addScore(100); this.active = false;
        }
    }
    draw(ctx) {
        let p = project(this.x, this.y, this.z); if (p.z < -FOV) return;
        let s = this.radius * p.s;
        
        ctx.strokeStyle = this.color; 
        ctx.lineWidth = 3; ctx.shadowBlur = 20; ctx.shadowColor = this.color;
        
        ctx.save(); ctx.translate(p.x, p.y); 
        let pulse = 1 + Math.sin(frames * 0.1) * 0.15;
        ctx.scale(pulse, pulse);
        ctx.rotate(Math.sin(frames * 0.05) * 0.2); 

        ctx.beginPath();
        if (this.type === 'heal') {
            let w = s/2.5; 
            ctx.moveTo(-w, -s); ctx.lineTo(w, -s); ctx.lineTo(w, -w);
            ctx.lineTo(s, -w); ctx.lineTo(s, w); ctx.lineTo(w, w);
            ctx.lineTo(w, s); ctx.lineTo(-w, s); ctx.lineTo(-w, w);
            ctx.lineTo(-s, w); ctx.lineTo(-s, -w); ctx.lineTo(-w, -w);
            ctx.closePath(); ctx.stroke();
            ctx.strokeRect(-w, -w, w*2, w*2); 
        } else if (this.type === 'weapon') {
            ctx.moveTo(-s, -s/3); ctx.lineTo(s*0.8, -s/3); 
            ctx.lineTo(s*0.8, s/4); ctx.lineTo(0, s/4); 
            ctx.lineTo(-s/3, s); ctx.lineTo(-s, s); 
            ctx.closePath(); ctx.stroke();
            ctx.beginPath(); ctx.arc(s*0.4, -s*0.05, s/5, 0, Math.PI*2); ctx.stroke();
        } else if (this.type === 'life') {
            ctx.moveTo(0, -s); 
            ctx.lineTo(s*0.8, s*0.6); 
            ctx.lineTo(0, s*0.3); 
            ctx.lineTo(-s*0.8, s*0.6); 
            ctx.closePath(); ctx.stroke();
            ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(0, s, s/3, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore(); ctx.shadowBlur=0;
    }
}

class Particle {
    constructor(x, y, z, color, type = 'dot') {
        this.x=x; this.y=y; this.z=z; this.color=color; this.type=type;
        this.vx=(Math.random()-0.5)*30; this.vy=(Math.random()-0.5)*30; this.vz=(Math.random()-0.5)*30;
        this.life=1.0; this.decay=0.015+Math.random()*0.02; this.angle=Math.random()*Math.PI*2;
        this.rotSpeed=(Math.random()-0.5)*0.4; this.size=10+Math.random()*20;
    }
    update() {
        this.x+=this.vx; this.y+=this.vy; this.z+=this.vz; this.angle+=this.rotSpeed; this.life-=this.decay;
    }
    draw(ctx) {
        if (this.life <= 0) return;
        let p = project(this.x, this.y, this.z); if(p.z < -FOV) return;
        ctx.globalAlpha = this.life;
        if (this.type === 'line') {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(this.angle);
            ctx.strokeStyle = this.color; ctx.lineWidth = 2 * p.s;
            ctx.beginPath(); ctx.moveTo(-this.size*p.s, 0); ctx.lineTo(this.size*p.s, 0); ctx.stroke(); ctx.restore();
        } else {
            ctx.fillStyle = this.color; ctx.fillRect(p.x, p.y, 4*p.s, 4*p.s);
        }
        ctx.globalAlpha = 1.0;
    }
}

function createParticles(x, y, z, color, count, type = 'dot') {
    for(let i=0; i<count; i++) Game.particles.push(new Particle(x, y, z, color, type));
}

let player;

function addScore(pts) {
    score += pts;
    document.getElementById('score').innerText = score;
    difficulty = 1 + (Game.level * 0.5) + Math.floor(score / 1000) * 0.1;
}

function addComboScore(pts) {
    combo++; multiplier = Math.min(5, 1 + Math.floor(combo / 5));
    document.getElementById('combo-display').innerText = `COMBO: ${combo} (x${multiplier})`;
    addScore(pts * multiplier);
}

function resetCombo() {
    if (combo > 5) VoiceSys.speak("Combo Lost");
    combo = 0; multiplier = 1; document.getElementById('combo-display').innerText = "";
}

function startWarp() {
    Game.warpTimer = 300; 
    Game.flashAlpha = 1.0; 
    Game.bullets = []; Game.powerups = []; 
    AudioSys.sfx.warp();
}

/**
 * BUCLE PRINCIPAL
 */
function update() {
    frames++;

    if (player && player.isDying) {
        Game.playerDeathTimer--;
        screenShake = 20 + ((120 - Game.playerDeathTimer) * 0.2);
        
        if (frames % 5 === 0) {
            createParticles(player.x + (Math.random()-0.5)*150, player.y + (Math.random()-0.5)*150, player.z, '#ff0', 20, 'dot');
            createParticles(player.x + (Math.random()-0.5)*150, player.y + (Math.random()-0.5)*150, player.z, '#f00', 10, 'line');
            AudioSys.sfx.explosion();
        }

        if (Game.playerDeathTimer <= 0) {
            endGame(false);
            return;
        }
    } else if (player) {
        player.update();
    }

    if (Game.warpTimer > 0) {
        Game.warpTimer--;
        
        if (Game.warpTimer > 200) {
            let t = (300 - Game.warpTimer) / 100; 
            SPEED = BASE_SPEED + (120 * (t * t)); 
        } else if (Game.warpTimer > 100) {
            SPEED = BASE_SPEED + 120; 
        } else {
            let t = Game.warpTimer / 100; 
            SPEED = BASE_SPEED + (120 * (t * t)); 
        }

        document.getElementById('warp-text').classList.remove('hidden');
        
        if (Game.warpTimer === 100) {
            Game.flashAlpha = 1.0;
            Game.level++;
            Game.boss = null;
            nextBossScore = score + (4000 * Game.level); 
            document.getElementById('level-display').innerText = `SECTOR: ${Game.level}`;
            VoiceSys.speak("Entering Sector " + Game.level);
        }

        if (Game.warpTimer === 0) {
            document.getElementById('warp-text').classList.add('hidden');
            SPEED = BASE_SPEED + (Game.level * 2);
        }
    } else if (!player || !player.isDying) {
        SPEED = BASE_SPEED + (Game.level * 2);
    }

    // Spawn Dinámico
    if (!Game.boss && Game.warpTimer <= 0 && (!player || !player.isDying)) {
        if (frames % Math.max(15, Math.floor(60 / difficulty)) === 0 && Math.random() > 0.3) {
            let spawnY = -Math.random() * 450 + 50; 
            Game.entities.push(new Enemy((Math.random()-0.5)*1200, spawnY, Z_LIMIT));
        }
        if (frames % 300 === 0 && Math.random() > 0.4) {
            Game.powerups.push(new PowerUp((Math.random()-0.5)*800, (Math.random()-0.5)*200 - 100, Z_LIMIT));
        }

        if (score >= nextBossScore && !Game.boss) {
            if (Game.level === 1) Game.boss = new BossWorm();
            else if (Game.level === 2) Game.boss = new BossMothership();
            else if (Game.level === 3) Game.boss = new BossCore();
            
            Game.entities.forEach(e => createParticles(e.x, e.y, e.z, '#fff', 5));
            Game.entities = [];
            MidiSys.play('boss'); // REPRODUCCIÓN MIDI JEFE
        }
    } else if (Game.boss && Game.boss.active) {
        if (Game.boss.isDying) {
            screenShake = 10 + ((180 - Game.bossDeathTimer) * 0.1); 
            if (frames % 4 === 0) {
                createParticles(Game.boss.x + (Math.random()-0.5)*300, Game.boss.y + (Math.random()-0.5)*300, Game.boss.z, '#fff', 15, 'dot');
                createParticles(Game.boss.x + (Math.random()-0.5)*300, Game.boss.y + (Math.random()-0.5)*300, Game.boss.z, '#f00', 5, 'line');
                AudioSys.sfx.hit();
            }
            Game.bossDeathTimer--;
            
            if (Game.bossDeathTimer <= 0) {
                Game.boss.active = false;
                MidiSys.play('normal'); // REGRESO MIDI NORMAL
                
                if (Game.level >= 3) {
                    Game.flashAlpha = 1.0;
                    setTimeout(() => endGame(true), 2000);
                } else {
                    startWarp();
                }
            }
        } else {
            Game.boss.update();
        }
    }

    Game.entities.forEach(e => e.update());
    Game.bullets.forEach(b => b.update());
    Game.particles.forEach(p => p.update());
    Game.powerups.forEach(p => p.update());

    Game.entities = Game.entities.filter(e => e.active);
    Game.bullets = Game.bullets.filter(b => b.active);
    Game.particles = Game.particles.filter(p => p.life > 0);
    Game.powerups = Game.powerups.filter(p => p.active);
    
    if (Game.boss && Game.boss.active) {
        let ui = document.getElementById('combo-display');
        ui.innerText = `BOSS: ${Math.max(0, Math.floor((Game.boss.hp / Game.boss.maxHp) * 100))}%`;
        ui.className = 'red-text';
    } else {
        document.getElementById('combo-display').className = 'yellow-text';
    }
}

function render() {
    ctx.fillStyle = 'rgba(5, 5, 5, 0.85)';
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
        screenShake *= 0.85; if (screenShake < 0.5) screenShake = 0;
    }

    Stars.updateAndDraw(ctx);
    WarpTunnel.updateAndDraw(ctx);
    Env.updateAndDraw(ctx);
    EMP.updateAndDraw(ctx);

    let renderList = [...Game.entities, ...Game.bullets, ...Game.powerups, player];
    
    if (Game.boss && Game.boss.active) {
        if (Game.level === 1) {
            for (let i = 0; i < Game.boss.numSegments; i++) renderList.push({ z: Game.boss.segments[i].z, draw: (c) => Game.boss.drawSegment(c, i) });
        } else {
            renderList.push(Game.boss);
        }
    }
    
    renderList.sort((a, b) => b.z - a.z);
    renderList.forEach(e => {
        if (e === player && player) { player.draw(ctx); } else if (e && e.draw) { e.draw(ctx); }
    });

    Game.particles.forEach(p => p.draw(ctx));
    
    if (Game.flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Game.flashAlpha})`;
        ctx.fillRect(0, 0, width, height);
        Game.flashAlpha -= 0.02; 
    }

    ctx.restore();
}

function gameLoop() {
    if (Game.state !== 'PLAYING') return;
    update(); render();
    gameLoopId = requestAnimationFrame(gameLoop);
}

function startGame() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('ui-layer').classList.remove('hidden');

    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.getElementById('mobile-controls').classList.remove('hidden');
    }
    
    AudioSys.init(); 
    MidiSys.play('normal'); // INICIA LA MÚSICA MIDI
    
    VoiceSys.speak("System Online. Entering Sector 1.");
    
    player = new Player(); Env.init(); Stars.init();
    score = 0; combo = 0; multiplier = 1; emps = 3; difficulty = 1; frames = 0; 
    Game.level = 1; nextBossScore = 1500; Game.warpTimer = 0;
    Game.entities = []; Game.bullets = []; Game.particles = []; Game.powerups = []; Game.boss = null;
    EMP.active = false;
    
    document.getElementById('score').innerText = score;
    document.getElementById('combo-display').innerText = '';
    document.getElementById('hp').innerText = player.hp;
    document.getElementById('emp-count').innerText = emps;
    document.getElementById('level-display').innerText = `SECTOR: 1`;
    
    Game.state = 'PLAYING'; gameLoop();
}

function endGame(victory = false) {
    Game.state = victory ? 'VICTORY' : 'GAMEOVER';
    MidiSys.stop(); // DETIENE MIDI
    Meta.save(score);

    document.getElementById('ui-layer').classList.add('hidden');
    document.getElementById('mobile-controls').classList.add('hidden');
    
    if (victory) {
        document.getElementById('victory-screen').classList.remove('hidden');
        document.getElementById('victory-score').innerText = score;
    } else {
        document.getElementById('game-over-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }
    
    cancelAnimationFrame(gameLoopId);
}

document.getElementById('high-score-start').innerText = Meta.highScore;

// Precarga y arranque seguro interactivo
document.getElementById('start-btn').addEventListener('click', async function() {
    const btn = this;
    btn.innerText = "LOADING SYSTEM...";
    btn.disabled = true;
    
    try {
        await Tone.start();
        await MidiSys.load();
    } catch(e) {
        console.warn("Precarga de audio con fallos menores. Arrancando en modo Fallback.");
    }
    
    btn.innerText = "INSERT COIN";
    btn.disabled = false;
    startGame();
});

</script>
